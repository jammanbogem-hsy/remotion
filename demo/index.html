<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>강릉 여행 브리핑</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #38bdf8 0%, #0f172a 48%, #020617 100%);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;
      }
      .wrap {
        width: min(100%, 980px);
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 28px;
        backdrop-filter: blur(16px);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
        overflow: hidden;
      }
      .hero {
        padding: 36px 36px 20px;
      }
      .eyebrow {
        font-size: 14px;
        letter-spacing: 0.28em;
        opacity: 0.72;
        margin-bottom: 12px;
      }
      h1 {
        margin: 0;
        font-size: clamp(34px, 6vw, 58px);
        line-height: 1.08;
      }
      p {
        margin: 14px 0 0;
        font-size: 18px;
        line-height: 1.6;
        color: rgba(255, 255, 255, 0.84);
      }
      video {
        display: block;
        width: 100%;
        background: black;
      }
      .footer {
        padding: 20px 36px 34px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
      a.button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 16px;
        border-radius: 999px;
        color: white;
        text-decoration: none;
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.16);
      }
      a.button:hover {
        background: rgba(255, 255, 255, 0.18);
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="hero">
        <div class="eyebrow">GANGNEUNG TRIP BRIEFING</div>
        <h1>강릉 여행 브리핑</h1>
        <p>Remotion으로 제작한 여행 일정 브리핑 영상입니다. 아래에서 바로 재생하거나 mp4 파일을 다운로드할 수 있어요.</p>
      </section>
      <video controls playsinline preload="metadata">
        <source src="./gangneung-trip-briefing.mp4" type="video/mp4" />
        브라우저가 비디오 재생을 지원하지 않습니다.
      </video>
      <section class="footer">
        <a class="button" href="./gangneung-trip-briefing.mp4">MP4 열기</a>
        <a class="button" href="./gangneung-trip-briefing.mp4" download>MP4 다운로드</a>
      </section>
    </main>
  </body>
</html>
